name: chezmoi-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: macos-latest
    env:
      CHEZMOI_CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache chezmoi
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/chezmoi
            ~/.cache/chezmoi
          key: ${{ runner.os }}-chezmoi-${{ hashFiles('.github/workflows/chezmoi-check.yml') }}
          restore-keys: |
            ${{ runner.os }}-chezmoi-

      - name: Install chezmoi
        run: |
          if [ ! -x "$HOME/.local/bin/chezmoi" ]; then
            sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          fi

      - name: Add chezmoi to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render personal profile config
        run: |
          chezmoi execute-template \
            --source "$GITHUB_WORKSPACE" \
            --init \
            --override-data '{"is_personal_pc":true}' \
            --file "$GITHUB_WORKSPACE/chezmoi/.chezmoi.toml.tmpl" \
            > "$RUNNER_TEMP/chezmoi.toml"

      - name: Validate gitconfig template render
        run: |
          chezmoi execute-template \
            --source "$GITHUB_WORKSPACE" \
            --config "$RUNNER_TEMP/chezmoi.toml" \
            --config-format toml \
            < "$GITHUB_WORKSPACE/chezmoi/dot_config/git/config.tmpl" \
            > /dev/null

      - name: Validate chezmoi apply dry-run (personal profile)
        run: |
          mkdir -p "$RUNNER_TEMP/home"
          chezmoi apply \
            --source "$GITHUB_WORKSPACE" \
            --config "$RUNNER_TEMP/chezmoi.toml" \
            --config-format toml \
            --destination "$RUNNER_TEMP/home" \
            --exclude scripts \
            --dry-run \
            --no-tty

      - name: Validate expected chezmoi targets
        run: |
          managed="$(chezmoi managed --source "$GITHUB_WORKSPACE")"
          while IFS= read -r target; do
            printf '%s\n' "$managed" | grep -Fx "$target" >/dev/null
          done <<'EOF_TARGETS'
          .config/git/config
          .config/sheldon/plugins.toml
          .config/zsh/.zprofile
          .config/zsh/.zshenv
          .config/zsh/.zshrc
          .zprofile
          .zshenv
          .zshrc
          EOF_TARGETS

      - name: Validate expected files are applied
        run: |
          home="$RUNNER_TEMP/home-apply"
          mkdir -p "$home"
          chezmoi apply \
            --source "$GITHUB_WORKSPACE" \
            --config "$RUNNER_TEMP/chezmoi.toml" \
            --config-format toml \
            --destination "$home" \
            --exclude scripts \
            --no-tty

          test -f "$home/.config/git/config"
          test -f "$home/.config/sheldon/plugins.toml"
          test -f "$home/.config/zsh/.zprofile"
          test -f "$home/.config/zsh/.zshenv"
          test -f "$home/.config/zsh/.zshrc"
          test -f "$home/.zprofile"
          test -f "$home/.zshenv"
          test -f "$home/.zshrc"

      - name: Shell syntax checks
        run: |
          sh -n "$GITHUB_WORKSPACE/chezmoi/run_once_00_install-homebrew.sh.tmpl"
          sh -n "$GITHUB_WORKSPACE/chezmoi/run_onchange_10_install-homebrew-packages.sh.tmpl"
          sh -n "$GITHUB_WORKSPACE/chezmoi/run_onchange_20_apply-macos-defaults.sh.tmpl"
          sh -n "$GITHUB_WORKSPACE/chezmoi/run_onchange_30_configure-login-items.sh.tmpl"
          sh -n "$GITHUB_WORKSPACE/chezmoi/run_onchange_40_configure-notchnook-license.sh.tmpl"
          zsh -n "$GITHUB_WORKSPACE/chezmoi/dot_zprofile"
          zsh -n "$GITHUB_WORKSPACE/chezmoi/dot_zshenv"
          zsh -n "$GITHUB_WORKSPACE/chezmoi/dot_zshrc"
          zsh -n "$GITHUB_WORKSPACE/chezmoi/dot_config/zsh/dot_zprofile"
          zsh -n "$GITHUB_WORKSPACE/chezmoi/dot_config/zsh/dot_zshenv"
          zsh -n "$GITHUB_WORKSPACE/chezmoi/dot_config/zsh/dot_zshrc"
