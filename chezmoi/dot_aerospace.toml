enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
default-root-container-layout = "tiles"
default-root-container-orientation = "horizontal"
automatically-unhide-macos-hidden-apps = true
on-focus-changed = [
  "move-mouse window-lazy-center",
  "exec-and-forget /bin/zsh -lc \"layout=\\$(aerospace list-windows --focused --format '%{window-layout}' 2>/dev/null); if [ \\\"$layout\\\" = floating ]; then borders active_color=0xfff5a97f inactive_color=0xff494d64 width=5.0; else borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0; fi\"",
]
after-startup-command = [
  "exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0",
  "exec-and-forget /bin/zsh -lc \"layout=\\$(aerospace list-windows --focused --format '%{window-layout}' 2>/dev/null); if [ \\\"$layout\\\" = floating ]; then borders active_color=0xfff5a97f inactive_color=0xff494d64 width=5.0; else borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0; fi\"",
]

[gaps.outer]
top = 5
bottom = 5
left = 5
right = 5

[mode.main.binding]
alt-h = "focus --boundaries-action wrap-around-the-workspace left"
alt-j = "focus --boundaries-action wrap-around-the-workspace down"
alt-k = "focus --boundaries-action wrap-around-the-workspace up"
alt-l = "focus --boundaries-action wrap-around-the-workspace right"
alt-shift-s = "exec-and-forget screencapture -i -c"
alt-shift-tab = "focus-monitor --wrap-around next"
alt-tab = "workspace-back-and-forth"
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-f = "fullscreen"
alt-slash = "layout tiles horizontal vertical"
alt-space = "layout floating tiling"
alt-1 = 'workspace "1.Chrome"'
alt-2 = 'workspace "2.Terminal"'
alt-3 = 'workspace "3.Xcode"'
alt-4 = 'workspace "4.AI"'
alt-5 = 'workspace "5"'
alt-6 = 'workspace "6"'
alt-7 = 'workspace "7"'
alt-8 = 'workspace "8"'
alt-9 = 'workspace "9"'
alt-0 = 'workspace "10"'
alt-r = "mode resize"
alt-m = "mode move"
cmd-h = []
cmd-alt-h = []

[mode.move.binding]
alt-1 = ['move-node-to-workspace "1.Chrome"', "mode main"]
alt-2 = ['move-node-to-workspace "2.Terminal"', "mode main"]
alt-3 = ['move-node-to-workspace "3.Xcode"', "mode main"]
alt-4 = ['move-node-to-workspace "4.AI"', "mode main"]
alt-5 = ['move-node-to-workspace "5"', "mode main"]
alt-6 = ['move-node-to-workspace "6"', "mode main"]
alt-7 = ['move-node-to-workspace "7"', "mode main"]
alt-8 = ['move-node-to-workspace "8"', "mode main"]
alt-9 = ['move-node-to-workspace "9"', "mode main"]
alt-0 = ['move-node-to-workspace "10"', "mode main"]
enter = "mode main"
esc = "mode main"

[mode.resize.binding]
h = "resize width -50"
j = "resize height +50"
k = "resize height -50"
l = "resize width +50"
enter = "mode main"
esc = "mode main"

[workspace-to-monitor-force-assignment]
"1.Chrome" = ["^DELL U4025QW$", "main"]
"2.Terminal" = ["^DELL U4025QW$", "main"]
"3.Xcode" = ["^DELL U4025QW$", "main"]
"4.AI" = ["^DELL U4025QW$", "main"]
"5" = ["secondary", "main"]
"6" = ["^DELL U4025QW$", "main"]
"7" = ["^DELL U4025QW$", "main"]
"8" = ["^DELL U4025QW$", "main"]
"9" = ["^DELL U4025QW$", "main"]
"10" = ["^DELL U4025QW$", "main"]
Cintiq = "^Wacom"

[[on-window-detected]]
if.app-id = "com.google.Chrome"
check-further-callbacks = true
run = [
  "layout floating",
  'move-node-to-workspace "1.Chrome"',
]

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = ['move-node-to-workspace "2.Terminal"']

[[on-window-detected]]
if.app-id = "com.apple.Terminal"
run = ['move-node-to-workspace "2.Terminal"']

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = ['move-node-to-workspace "1.Chrome"']

[[on-window-detected]]
if.app-id = "com.apple.dt.Xcode"
run = ['move-node-to-workspace "3.Xcode"']

[[on-window-detected]]
if.app-id = "com.apple.iphonesimulator"
run = ['move-node-to-workspace "3.Xcode"']

[[on-window-detected]]
if.app-id = "com.openai.codex"
run = ['move-node-to-workspace "4.AI"']

[[on-window-detected]]
if.app-id = "com.apple.iphonesimulator"
check-further-callbacks = true
run = [
  "layout tiling",
  'move-node-to-workspace "3.Xcode"',
]

[[on-window-detected]]
if.app-id = "jp.co.celsys.CLIPSTUDIOPAINT"
run = ['move-node-to-workspace "Cintiq"']
